# WoodWard Neo4j Docker Compose
# Segregated from CaseLawDB (runs on different port)

services:
  woodward-neo4j:
    image: neo4j:5.15.0
    container_name: woodward-neo4j
    ports:
      - "7475:7474"  # HTTP (different from CaseLawDB 7474)
      - "7688:7687"  # Bolt (different from CaseLawDB 7687)
    environment:
      - NEO4J_AUTH=neo4j/woodward_secure_2024
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
      - NEO4J_dbms_memory_heap_initial__size=512m
      - NEO4J_dbms_memory_heap_max__size=1G
    volumes:
      - ~/neo4j/woodward/data:/data
      - ~/neo4j/woodward/logs:/logs
      - ~/neo4j/woodward/import:/var/lib/neo4j/import
      - ~/neo4j/woodward/plugins:/plugins
    restart: unless-stopped
